{% import "components/icons.html" as icons %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rezepte{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/htmx.js"></script>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
</head>
<body>
    <header>
        <a href="/" class="site-title"><img src="/static/img/logo.png" alt="Rezepte" height="32" style="border-radius: 6px;"></a>
        <nav class="main-nav" aria-label="Hauptnavigation">
            {% block header_actions %}
            <a href="/recipes/new" class="nav-link">Neues Rezept</a>
            {% endblock %}
            <a href="/?filter=laenger-nicht-gemacht&kategorie=Mittagessen" class="nav-link" aria-label="Inspiration: Länger nicht gemachte Mittagessen">Inspiration</a>
            <a href="/wochenvorschau" class="nav-link">Wochenvorschau</a>
            <div class="hamburger-menu-container">
                <button 
                    type="button"
                    class="hamburger-btn" 
                    id="hamburger-btn"
                    aria-label="Menü öffnen" 
                    aria-expanded="false" 
                    aria-controls="hamburger-dropdown"
                >
                    {% call icons::icon_menu() %}
                </button>
                <div 
                    id="hamburger-dropdown" 
                    class="hamburger-menu" 
                    role="menu" 
                    aria-hidden="true"
                >
                    <a href="/heute" class="hamburger-menu-item" role="menuitem">Heute</a>
                    <a href="/recipes/duplicates" class="hamburger-menu-item" role="menuitem">Dubletten prüfen</a>
                </div>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    (function() {
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const hamburgerMenu = document.getElementById('hamburger-dropdown');
        
        if (!hamburgerBtn || !hamburgerMenu) return;
        
        function toggleMenu() {
            const isOpen = hamburgerMenu.classList.contains('open');
            if (isOpen) {
                closeMenu();
            } else {
                openMenu();
            }
        }
        
        function openMenu() {
            // Menü-Position dynamisch an Hamburger-Icon anpassen
            const btnRect = hamburgerBtn.getBoundingClientRect();
            const viewportWidth = window.innerWidth;
            const menuWidth = 220;
            
            // Wenn Icon in rechter Bildschirmhälfte → right: 0
            // Wenn Icon in linker Bildschirmhälfte → left: 0
            if (btnRect.right > viewportWidth / 2) {
                hamburgerMenu.style.left = 'auto';
                hamburgerMenu.style.right = '0';
            } else {
                hamburgerMenu.style.right = 'auto';
                hamburgerMenu.style.left = '0';
            }
            
            hamburgerMenu.classList.add('open');
            hamburgerMenu.setAttribute('aria-hidden', 'false');
            hamburgerBtn.setAttribute('aria-expanded', 'true');
            hamburgerBtn.setAttribute('aria-label', 'Menü schließen');
            // Fokus auf erstes Menü-Element setzen
            const firstItem = hamburgerMenu.querySelector('[role="menuitem"]');
            if (firstItem) {
                firstItem.focus();
            }
        }
        
        function closeMenu() {
            hamburgerMenu.classList.remove('open');
            hamburgerMenu.setAttribute('aria-hidden', 'true');
            hamburgerBtn.setAttribute('aria-expanded', 'false');
            hamburgerBtn.setAttribute('aria-label', 'Menü öffnen');
            // Fokus zurück auf den Button
            hamburgerBtn.focus();
        }
        
        hamburgerBtn.addEventListener('click', toggleMenu);
        
        // Schließen bei Klick außerhalb
        document.addEventListener('click', function(event) {
            if (!hamburgerBtn.contains(event.target) && !hamburgerMenu.contains(event.target)) {
                if (hamburgerMenu.classList.contains('open')) {
                    closeMenu();
                }
            }
        });
        
        // Schließen bei Escape-Taste
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && hamburgerMenu.classList.contains('open')) {
                closeMenu();
            }
        });
        
        // Menü schließen wenn ein Link geklickt wird
        const menuItems = hamburgerMenu.querySelectorAll('[role="menuitem"]');
        menuItems.forEach(function(item) {
            item.addEventListener('click', function() {
                closeMenu();
            });
        });
    })();
    </script>
</body>
</html>
