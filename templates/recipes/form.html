{% extends "base.html" %}

{% block title %}Neues Rezept - Rezepte{% endblock %}

{% block content %}
<h1>Neues Rezept</h1>

{% if !errors.is_empty() %}
<div class="errors">
    <ul>
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form method="POST" action="/recipes">
    <div class="form-group">
        <label for="title">Titel *</label>
        <input type="text" id="title" name="title" value="{{ title }}" maxlength="100">
    </div>

    <div class="form-group">
        <label>Kategorien *</label>
        <div class="checkbox-group">
            {% for category in categories %}
            <label class="checkbox-label">
                <input type="checkbox" name="categories" value="{{ category }}"
                    {% if selected_categories.contains(category) %}checked{% endif %}>
                {{ category }}
            </label>
            {% endfor %}
        </div>
    </div>

    <div class="form-group">
        <label for="ingredients">Zutaten</label>
        <textarea id="ingredients" name="ingredients" rows="6" maxlength="2000">{{ ingredients }}</textarea>
    </div>

    <div class="form-group">
        <label for="instructions">Anleitung</label>
        <textarea id="instructions" name="instructions" rows="10" maxlength="5000">{{ instructions }}</textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary">Rezept speichern</button>
        <a href="/" class="btn-secondary">Abbrechen</a>
    </div>
</form>
{% endblock %}
