<div id="inline-rating-{{ id }}" class="inline-rating"
     title="Bewertung antippen zum Ändern"
     aria-label="{% if let Some(r) = rating %}{{ r }} von 5 Sternen{% else %}Noch keine Bewertung{% endif %}">
    <form method="POST" action="/heute/recipes/{{ id }}/rating" class="inline-rating-form">
        <button
            type="submit"
            name="rating"
            value="{% if self.rating_is_active(5) %}{% else %}5{% endif %}"
            class="inline-rating-btn{% if self.rating_is_active(5) %} active{% endif %}"
            aria-label="5 Sterne{% if self.rating_is_active(5) %} – aktiv (antippen zum Zurücksetzen){% else %} – inaktiv{% endif %}"
            hx-post="/heute/recipes/{{ id }}/rating"
            hx-vals='{"rating": "{% if self.rating_is_active(5) %}{% else %}5{% endif %}"}'
            hx-target="#inline-rating-{{ id }}"
            hx-swap="outerHTML"
        >{% if self.star_filled(5) %}★{% else %}☆{% endif %}</button>
        <button
            type="submit"
            name="rating"
            value="{% if self.rating_is_active(4) %}{% else %}4{% endif %}"
            class="inline-rating-btn{% if self.rating_is_active(4) %} active{% endif %}"
            aria-label="4 Sterne{% if self.rating_is_active(4) %} – aktiv (antippen zum Zurücksetzen){% else %} – inaktiv{% endif %}"
            hx-post="/heute/recipes/{{ id }}/rating"
            hx-vals='{"rating": "{% if self.rating_is_active(4) %}{% else %}4{% endif %}"}'
            hx-target="#inline-rating-{{ id }}"
            hx-swap="outerHTML"
        >{% if self.star_filled(4) %}★{% else %}☆{% endif %}</button>
        <button
            type="submit"
            name="rating"
            value="{% if self.rating_is_active(3) %}{% else %}3{% endif %}"
            class="inline-rating-btn{% if self.rating_is_active(3) %} active{% endif %}"
            aria-label="3 Sterne{% if self.rating_is_active(3) %} – aktiv (antippen zum Zurücksetzen){% else %} – inaktiv{% endif %}"
            hx-post="/heute/recipes/{{ id }}/rating"
            hx-vals='{"rating": "{% if self.rating_is_active(3) %}{% else %}3{% endif %}"}'
            hx-target="#inline-rating-{{ id }}"
            hx-swap="outerHTML"
        >{% if self.star_filled(3) %}★{% else %}☆{% endif %}</button>
        <button
            type="submit"
            name="rating"
            value="{% if self.rating_is_active(2) %}{% else %}2{% endif %}"
            class="inline-rating-btn{% if self.rating_is_active(2) %} active{% endif %}"
            aria-label="2 Sterne{% if self.rating_is_active(2) %} – aktiv (antippen zum Zurücksetzen){% else %} – inaktiv{% endif %}"
            hx-post="/heute/recipes/{{ id }}/rating"
            hx-vals='{"rating": "{% if self.rating_is_active(2) %}{% else %}2{% endif %}"}'
            hx-target="#inline-rating-{{ id }}"
            hx-swap="outerHTML"
        >{% if self.star_filled(2) %}★{% else %}☆{% endif %}</button>
        <button
            type="submit"
            name="rating"
            value="{% if self.rating_is_active(1) %}{% else %}1{% endif %}"
            class="inline-rating-btn{% if self.rating_is_active(1) %} active{% endif %}"
            aria-label="1 Stern{% if self.rating_is_active(1) %} – aktiv (antippen zum Zurücksetzen){% else %} – inaktiv{% endif %}"
            hx-post="/heute/recipes/{{ id }}/rating"
            hx-vals='{"rating": "{% if self.rating_is_active(1) %}{% else %}1{% endif %}"}'
            hx-target="#inline-rating-{{ id }}"
            hx-swap="outerHTML"
        >{% if self.star_filled(1) %}★{% else %}☆{% endif %}</button>
    </form>
</div>
